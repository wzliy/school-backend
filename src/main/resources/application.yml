server:
  port: ${SERVER_PORT:8088}

spring:
  application:
    name: school-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  file:
    storage-type: local
    local-path: ${FILE_LOCAL_PATH:/data/school/uploads}
    public-url-prefix: ${FILE_PUBLIC_URL_PREFIX:/uploads}
    max-size: ${FILE_MAX_SIZE:20MB}
